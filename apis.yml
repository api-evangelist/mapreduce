aid: mapreduce
name: MapReduce
description: >-
  MapReduce is a programming model and processing technique for computing large
  data sets in parallel across a distributed cluster. Originally developed by
  Google and popularized by Apache Hadoop, it splits data processing into map
  and reduce phases to enable scalable big data analytics.
